<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chụp Photobooth | Cici Media</title>
    <link rel="icon" type="image/png" href="logos/cicimedia.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .tool-layout { display: flex; gap: 2rem; flex-wrap: wrap; }
        
        /* Khu vực Camera */
        .camera-panel {
            flex: 2; min-width: 320px; background: var(--bg-surface); padding: 1.5rem;
            border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow);
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        .booth-screen {
            position: relative; width: 100%; max-width: 800px; aspect-ratio: 4/3; 
            background: #000; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #booth-video {
            width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* Lật gương camera */
        }

        #booth-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: fill; pointer-events: none; z-index: 10;
        }

        #countdown-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 8rem; font-weight: 800; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 20; display: none;
        }

        #flash-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 30; opacity: 0; pointer-events: none;
            transition: opacity 0.1s ease-out;
        }
        #flash-effect.flash { opacity: 1; }

        /* Khu vực Bảng điều khiển */
        .controls-panel {
            flex: 1; min-width: 300px; background: var(--bg-surface); padding: 1.5rem;
            border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow);
            display: flex; flex-direction: column; gap: 1.2rem;
        }

        .setting-group { margin-bottom: 0.5rem; }
        .setting-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--text-primary); }
        .prop-input {
            width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--bg-body); color: var(--text-primary); font-family: inherit; font-size: 0.9rem;
        }

        .upload-box {
            border: 2px dashed var(--border-color); border-radius: 12px;
            padding: 1.2rem; text-align: center; cursor: pointer;
            transition: var(--transition); background: var(--bg-body);
        }
        .upload-box:hover { border-color: var(--accent); background: var(--accent-light); }
        .upload-box input[type="file"] { display: none; }

        .btn-capture {
            background: #ef4444; color: white; border: none; padding: 1.2rem;
            border-radius: 12px; font-weight: 700; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: var(--transition); text-transform: uppercase; letter-spacing: 1px;
            margin-top: auto; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }
        .btn-capture:hover { background: #dc2626; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(239, 68, 68, 0.4); }
        .btn-capture:active { transform: translateY(0); }
        .btn-capture:disabled { background: #9ca3af; box-shadow: none; cursor: not-allowed; transform: none; }

        .btn-outline {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-primary);
            padding: 0.8rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
            width: 100%; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        #gallery {
            display: flex; gap: 0.8rem; overflow-x: auto; margin-top: 1rem; padding-bottom: 0.5rem;
            width: 100%; max-width: 800px;
        }
        #gallery::-webkit-scrollbar { height: 6px; }
        #gallery::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .gallery-item {
            width: 120px; height: 90px; border-radius: 8px; border: 2px solid var(--border-color);
            object-fit: cover; flex-shrink: 0; cursor: pointer; transition: 0.2s;
        }
        .gallery-item:hover { border-color: var(--accent); transform: scale(1.05); }

    </style>
</head>
<body>
    <div class="app-layout">
        <header class="mobile-header">
            <div class="mobile-brand"><img src="logos/cicimedia.png" alt="Cici Media"></div>
            <i class="ph ph-list menu-toggle" id="mobile-menu-btn"></i>
        </header>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="brand"><img src="logos/cicimedia.png" alt="Cici Media Logo" class="brand-logo"></div>
            <nav class="menu">
                <div class="menu-label">MENU CHÍNH</div>
                <a href="index.html" class="menu-item"><i class="ph ph-squares-four"></i> Tổng quan</a>
                <a href="exif-frame.html" class="menu-item"><i class="ph ph-camera"></i> Khung Ảnh EXIF</a>
                <a href="photobooth.html" class="menu-item active"><i class="ph ph-camera-rotate"></i> Chụp Photobooth</a>
                <a href="shutter-check.html" class="menu-item"><i class="ph ph-shutter"></i> Kiểm tra Số Shot</a>
                <a href="watermark.html" class="menu-item"><i class="ph ph-image"></i> Chèn Watermark</a>
                <a href="dslrbooth-frame.html" class="menu-item"><i class="ph ph-bounding-box"></i> Frame DSLRBooth</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="menu-item" id="theme-toggle"><i class="ph ph-moon"></i> Đổi Giao Diện</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar" style="margin-bottom: 1.5rem;">
                <div>
                    <h1 class="page-title">Live Photobooth</h1>
                    <p class="page-subtitle">Tích hợp khung overlay, đếm ngược và chụp trực tiếp từ Webcam.</p>
                </div>
            </header>

            <div class="tool-layout">
                <div class="camera-panel">
                    <div class="booth-screen" id="booth-screen">
                        <video id="booth-video" autoplay playsinline></video>
                        <img id="booth-overlay" src="" style="display: none;">
                        <div id="countdown-display">3</div>
                        <div id="flash-effect"></div>
                    </div>
                    
                    <div style="width: 100%; text-align: left; margin-top: 1rem; color: var(--text-secondary); font-size: 0.85rem;">
                        <i class="ph-fill ph-images"></i> <b>Ảnh đã chụp gần đây:</b>
                    </div>
                    <div id="gallery"></div>
                </div>

                <div class="controls-panel">
                    
                    <div class="setting-group">
                        <label><i class="ph-bold ph-video-camera"></i> 1. Chọn Camera</label>
                        <select id="camera-select" class="prop-input" onchange="startCamera()"></select>
                    </div>

                    <div class="setting-group" style="margin-top: 1rem;">
                        <label><i class="ph-bold ph-layout"></i> 2. Khung Overlay (PNG Trong Suốt)</label>
                        <div class="upload-box" onclick="document.getElementById('frame-upload').click()">
                            <i class="ph-bold ph-upload-simple" style="font-size: 1.8rem; color: var(--accent);"></i>
                            <p style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);" id="frame-name">Click để tải khung đục lỗ lên</p>
                            <input type="file" id="frame-upload" accept="image/png">
                        </div>
                        <button class="btn-outline" style="margin-top: 0.5rem;" onclick="clearFrame()">
                            <i class="ph-bold ph-trash"></i> Bỏ khung hiện tại
                        </button>
                    </div>

                    <div class="setting-group" style="margin-top: 1rem;">
                        <label><i class="ph-bold ph-timer"></i> 3. Đếm ngược (Countdown)</label>
                        <select id="timer-select" class="prop-input">
                            <option value="3">3 giây</option>
                            <option value="5">5 giây</option>
                            <option value="0">Chụp liền (Không đếm)</option>
                        </select>
                    </div>

                    <button class="btn-capture" id="btn-capture" onclick="startCapture()">
                        <i class="ph-fill ph-camera"></i> CHỤP ẢNH
                    </button>
                    <p style="text-align: center; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">Có thể bấm <b>Phím Space</b> để chụp</p>

                </div>
            </div>

            <canvas id="capture-canvas" style="display: none;"></canvas>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        const videoEl = document.getElementById('booth-video');
        const overlayEl = document.getElementById('booth-overlay');
        const cameraSelect = document.getElementById('camera-select');
        const btnCapture = document.getElementById('btn-capture');
        const countdownDisplay = document.getElementById('countdown-display');
        const flashEffect = document.getElementById('flash-effect');
        const captureCanvas = document.getElementById('capture-canvas');
        const ctx = captureCanvas.getContext('2d');
        const gallery = document.getElementById('gallery');

        let currentStream = null;
        let isCapturing = false;
        let frameImg = null;

        // BƯỚC 1: QUẢN LÝ CAMERA
        async function getCameras() {
            try {
                // Yêu cầu quyền truy cập trước để lấy tên thiết bị đầy đủ
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
                
                if(videoDevices.length > 0) startCamera();
                else Swal.fire('Lỗi', 'Không tìm thấy camera nào kết nối với máy tính!', 'error');

            } catch (err) {
                Swal.fire('Thiếu quyền', 'Vui lòng cho phép trình duyệt truy cập Camera để sử dụng tính năng này.', 'warning');
            }
        }

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const deviceId = cameraSelect.value;
            const constraints = {
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    width: { ideal: 1920 }, // Cố gắng lấy Full HD
                    height: { ideal: 1080 }
                }
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoEl.srcObject = currentStream;
            } catch (err) {
                console.error('Lỗi mở camera: ', err);
            }
        }

        // BƯỚC 2: QUẢN LÝ KHUNG ẢNH (OVERLAY)
        document.getElementById('frame-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('frame-name').innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                overlayEl.src = event.target.result;
                overlayEl.style.display = 'block';
                
                frameImg = new Image();
                frameImg.src = event.target.result;
            }
            reader.readAsDataURL(file);
            this.value = ''; // reset
        });

        function clearFrame() {
            overlayEl.src = "";
            overlayEl.style.display = 'none';
            frameImg = null;
            document.getElementById('frame-name').innerText = "Click để tải khung đục lỗ lên";
        }

        // BƯỚC 3: LOGIC CHỤP VÀ ĐẾM NGƯỢC
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isCapturing && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                startCapture();
            }
        });

        function startCapture() {
            if (isCapturing) return;
            const timer = parseInt(document.getElementById('timer-select').value);
            
            if (timer === 0) {
                executeCapture();
            } else {
                isCapturing = true;
                btnCapture.disabled = true;
                let count = timer;
                countdownDisplay.innerText = count;
                countdownDisplay.style.display = 'block';

                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownDisplay.innerText = count;
                    } else {
                        clearInterval(interval);
                        countdownDisplay.style.display = 'none';
                        executeCapture();
                    }
                }, 1000);
            }
        }

        function executeCapture() {
            // Chớp flash
            flashEffect.classList.add('flash');
            setTimeout(() => flashEffect.classList.remove('flash'), 150);

            // Thiết lập kích thước Canvas bằng kích thước gốc của luồng Video
            captureCanvas.width = videoEl.videoWidth;
            captureCanvas.height = videoEl.videoHeight;

            // TRỘN ẢNH
            ctx.save();
            // Lật ngược canvas để ảnh không bị ngược trái-phải do lật gương
            ctx.translate(captureCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(videoEl, 0, 0, captureCanvas.width, captureCanvas.height);
            ctx.restore();

            // Vẽ đè Khung Overlay (Nếu có)
            if (frameImg) {
                ctx.drawImage(frameImg, 0, 0, captureCanvas.width, captureCanvas.height);
            }

            // XUẤT FILE VÀ LƯU
            const dataUrl = captureCanvas.toDataURL('image/png');
            
            // Add vào Gallery
            const imgEl = document.createElement('img');
            imgEl.className = 'gallery-item';
            imgEl.src = dataUrl;
            imgEl.onclick = () => showPreviewImage(dataUrl);
            gallery.prepend(imgEl); // Thêm vào đầu danh sách

            // Tự động tải xuống
            const link = document.createElement('a');
            link.download = `Cici_Booth_${Date.now()}.png`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // Reset trạng thái
            isCapturing = false;
            btnCapture.disabled = false;
        }

        function showPreviewImage(url) {
            Swal.fire({
                imageUrl: url,
                imageAlt: 'Photobooth Result',
                showConfirmButton: true,
                confirmButtonText: '<i class="ph-bold ph-download-simple"></i> Tải Lại',
                confirmButtonColor: 'var(--accent)',
                width: 'auto'
            }).then((result) => {
                if (result.isConfirmed) {
                    const link = document.createElement('a');
                    link.download = `Cici_Booth_ReDownload_${Date.now()}.png`;
                    link.href = url;
                    link.click();
                }
            });
        }

        // Khởi động
        window.addEventListener('load', getCameras);

    </script>
</body>
</html>
