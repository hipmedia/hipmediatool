<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Gọi Video WebRTC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        video { background: #2d3748; border-radius: 0.75rem; width: 100%; height: auto; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Trình Gọi Video WebRTC</h1>
        
        <div class="mb-6 p-4 bg-gray-50 rounded-xl border border-gray-200 space-y-4">
            <div class="flex flex-col">
                <label class="text-sm font-medium text-gray-700 mb-1">Mã kết nối (SDP / ICE Candidate):</label>
                <textarea id="sdpArea" class="w-full p-2 border rounded-lg h-24 text-xs" placeholder="Dán mã nhận được từ đối tác ở đây..."></textarea>
            </div>
            <div class="flex space-x-2">
                <button id="createOfferBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg flex-1">Tạo Mã Gọi</button>
                <button id="acceptAnswerBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg flex-1">Kết nối</button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="relative">
                <p class="text-sm font-semibold mb-2">Camera của tôi:</p>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <div class="relative">
                <p class="text-sm font-semibold mb-2">Đối tác:</p>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div class="mt-8 flex justify-center space-x-4">
            <button id="startBtn" class="bg-gray-800 hover:bg-black text-white font-bold py-3 px-6 rounded-full transition">Bật Camera</button>
        </div>
    </div>

    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const sdpArea = document.getElementById('sdpArea');
        const startBtn = document.getElementById('startBtn');
        const createOfferBtn = document.getElementById('createOfferBtn');
        const acceptAnswerBtn = document.getElementById('acceptAnswerBtn');

        let localStream;
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        // Thu thập các ICE candidate
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                console.log("New ICE candidate: ", JSON.stringify(event.candidate));
            }
        };

        pc.ontrack = (event) => { remoteVideo.srcObject = event.streams[0]; };

        async function startCamera() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        createOfferBtn.addEventListener('click', async () => {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            sdpArea.value = JSON.stringify(pc.localDescription);
            alert("Đã tạo Offer! Hãy gửi mã này cho đối tác.");
        });

        acceptAnswerBtn.addEventListener('click', async () => {
            const data = JSON.parse(sdpArea.value);
            
            if (data.type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                sdpArea.value = JSON.stringify(pc.localDescription);
                alert("Đã nhận Offer, tạo Answer thành công! Gửi lại mã này cho người gọi.");
            } else if (data.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data));
                alert("Đã kết nối thành công!");
            }
        });

        startBtn.addEventListener('click', startCamera);
    </script>
</body>
</html>
