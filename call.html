<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Gọi Video WebRTC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        video {
            background: #2d3748;
            border-radius: 0.75rem;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Trình Gọi Video Thử Nghiệm</h1>
        
        <!-- Phần tạo link mời -->
        <div class="mb-6 p-4 bg-gray-50 rounded-xl border border-gray-200">
            <label class="block text-sm font-medium text-gray-700 mb-2">Mời người khác tham gia:</label>
            <div class="flex space-x-2">
                <input type="text" id="inviteLink" readonly class="flex-1 p-2 border rounded-lg bg-gray-100 text-gray-600" placeholder="Nhấn nút tạo để lấy link...">
                <button id="createLinkBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition">
                    Tạo Link
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="relative">
                <p class="text-sm font-semibold mb-2">Camera của tôi:</p>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <div class="relative">
                <p class="text-sm font-semibold mb-2">Đối tác:</p>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div class="mt-8 flex justify-center space-x-4">
            <button id="startBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full transition">
                Bật Camera
            </button>
            <button id="stopBtn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-full transition" disabled>
                Tắt Camera
            </button>
        </div>
    </div>

    <script>
        const localVideo = document.getElementById('localVideo');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const createLinkBtn = document.getElementById('createLinkBtn');
        const inviteLink = document.getElementById('inviteLink');

        let localStream;

        // Hàm tạo link mời (Giả lập)
        createLinkBtn.addEventListener('click', () => {
            const roomId = Math.random().toString(36).substring(2, 10);
            const fullLink = window.location.origin + window.location.pathname + "?room=" + roomId;
            inviteLink.value = fullLink;
            alert("Link mời đã được tạo! Bạn có thể gửi cho đối tác.");
        });

        // Hàm truy cập camera và microphone
        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } catch (error) {
                console.error("Lỗi khi truy cập camera: ", error);
                alert("Không thể truy cập camera. Vui lòng kiểm tra quyền.");
            }
        }

        // Hàm dừng camera
        function stopCamera() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
    </script>
</body>
</html>
