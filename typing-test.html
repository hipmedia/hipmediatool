<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./logos/logos.png">
    <title>Typing Test | Cici Media</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="app-layout">
        <header class="mobile-header">
            <div class="mobile-brand">
                <img src="https://cicivn.io.vn/assets/images/branding/logo-placeholder.png" alt="Cici Media">
            </div>
            <i class="ph ph-list menu-toggle" id="mobile-menu-btn"></i>
        </header>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="https://cicivn.io.vn/assets/images/branding/logo-placeholder.png" alt="Cici Media Logo" class="brand-logo">
            </div>
            <nav class="menu">
                <div class="menu-label">MENU CHÍNH</div>
                <a href="index.html" class="menu-item"><i class="ph ph-squares-four"></i> Tổng quan</a>
                <a href="exif-frame.html" class="menu-item"><i class="ph ph-camera"></i> Đóng Dấu Ảnh</a>
                <a href="watermark.html" class="menu-item"><i class="ph ph-image"></i> Chèn Watermark</a>
                <a href="photo-editor.html" class="menu-item"><i class="ph ph-aperture"></i> Photo Editor</a>
                <a href="qr-generator.html" class="menu-item"><i class="ph ph-qr-code"></i> Mã QR Tool</a>
                <a href="typing-test.html" class="menu-item active"><i class="ph ph-keyboard"></i> Typing Test</a>
                <a href="lucky-draw.html" class="menu-item"><i class="ph ph-gift"></i> Vòng Quay & Bốc Thăm</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="menu-item" id="theme-toggle"><i class="ph ph-moon"></i> Đổi Giao Diện</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1 class="page-title">Typing Test</h1>
                    <p class="page-subtitle">Gõ trực tiếp vào đoạn văn dưới đây. Thời gian tự động bắt đầu.</p>
                </div>
            </header>

            <div class="tool-container" style="max-width: 900px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <div style="font-size: 1.2rem; font-weight: 600; color: var(--text-secondary);">
                        Thời gian: <span id="timer" style="color: var(--accent); font-size: 1.5rem;">0</span>s
                    </div>
                    <button onclick="initTest()" class="tool-btn" style="padding: 0.5rem 1rem;">
                        <i class="ph ph-arrows-clockwise"></i> Đổi câu khác
                    </button>
                </div>

                <div class="typing-wrapper" id="typing-area" onclick="document.getElementById('hidden-input').focus()">
                    <input type="text" id="hidden-input" class="hidden-input" autocomplete="off">
                    <div id="quote-display" class="type-text"></div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
    <script>
        const quotes = [
            "lớn sáng rễ bia thức mật muộn khoản bẩn ngắn thấy khoản này đẹp mềm cuối ba bay giữa mùa nghìn lớp hát phố khô đi xuống nhạt mạng đứng tập kia mong cậu thấy cháu vào làng khi nhìn mười tìm bảo hát sữa tất lấy",
            "thấp xinh rộng thương giúp biển chợ với mua trăm khen vui sáng viết vài anh khoản bốn ta đến chua sạch bia núi em phố trái tuy chúng duyên lại giây khi nhạt lắm thành kìa nào mỗi thường khuya cô ngon cậu cởi biển",
            "ghét sân cha của nấu xa gọi hạ cao bài hoa cô đó cửa trả trước nhảy giám khi anh đang dự tới cô giúp hôm tuần tới đắng sau xấu bốn mười ạ được  cuộc kẹo sạch đông thị dài mong đạp nhìn lá rất rượu trăm đâu biển trưa",
            "thuốc cả bay ăn rẻ mong cực lạnh ra uống lạnh mệt năm tám viên trả bàn ước khi thích cuối món phê phút Việt hỏi trà mợ việc nhẹ rượu triệu đường lúc ốm mùa ngày nhạc dở đến trường mến gọi bút chị giữa dưới hơi"
        ];
        
        let quoteChars = [];
        let startTime = null;
        let timerInterval = null;
        let isTestActive = false;

        const quoteDisplay = document.getElementById('quote-display');
        const hiddenInput = document.getElementById('hidden-input');
        const timerDisplay = document.getElementById('timer');

        function initTest() {
            clearInterval(timerInterval);
            startTime = null;
            isTestActive = false;
            timerDisplay.innerText = '0';
            hiddenInput.value = '';
            hiddenInput.disabled = false;

            // Random câu
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            quoteChars = randomQuote.split('');
            
            // Tạo các thẻ span cho từng ký tự
            quoteDisplay.innerHTML = '';
            quoteChars.forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char;
                span.classList.add('type-char');
                if(index === 0) span.classList.add('current'); // Con trỏ nhấp nháy ở ký tự đầu
                quoteDisplay.appendChild(span);
            });
            hiddenInput.focus();
        }

        hiddenInput.addEventListener('input', () => {
            if (!isTestActive && hiddenInput.value.length > 0) {
                // Bắt đầu đếm giờ
                isTestActive = true;
                startTime = new Date();
                timerInterval = setInterval(() => {
                    timerDisplay.innerText = Math.floor((new Date() - startTime) / 1000);
                }, 1000);
            }

            const typedChars = hiddenInput.value.split('');
            const spans = quoteDisplay.querySelectorAll('span');

            spans.forEach((span, index) => {
                const typedChar = typedChars[index];
                span.classList.remove('correct', 'incorrect', 'current');

                if (typedChar == null) {
                    // Chưa gõ tới
                } else if (typedChar === quoteChars[index]) {
                    span.classList.add('correct');
                } else {
                    span.classList.add('incorrect');
                }
            });

            // Gắn con trỏ (cursor)
            if (typedChars.length < quoteChars.length) {
                spans[typedChars.length].classList.add('current');
            }

            // Hoàn thành
            if (typedChars.length === quoteChars.length) {
                clearInterval(timerInterval);
                hiddenInput.disabled = true;
                
                // Check lỗi
                let errors = 0;
                spans.forEach(span => { if(span.classList.contains('incorrect')) errors++; });

                const timeTaken = (new Date() - startTime) / 1000 / 60; // phút
                const wpm = Math.round((quoteChars.length / 5) / timeTaken);

                Swal.fire({
                    title: 'Hoàn thành!',
                    html: `Tốc độ: <b>${wpm} WPM</b><br>Lỗi sai: <b style="color:red">${errors}</b>`,
                    icon: 'success',
                    confirmButtonColor: 'var(--accent)'
                }).then(() => initTest());
            }
        });

        // Click vùng ngoài vẫn trỏ vào input
        document.addEventListener('click', () => hiddenInput.focus());
        initTest();
    </script>
</body>
</html>
